name: Build and Release

on:
  push:
    tags:
      - "v*"

jobs:
  build-mac:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Qt
        uses: jurplel/install-qt-action@v3
        with:
          version: "6.7.0"
          modules: "qtnetworkauth"

      - name: Build
        run: |
          cd frontend
          cmake -B build -DCMAKE_BUILD_TYPE=Release
          cmake --build build --config Release

      - name: Deploy
        run: |
          /usr/local/Qt/6.7.0/macos/bin/macdeployqt frontend/build/frontend.app -qmldir=frontend
          zip -r WeatherApp-Mac.zip frontend/build/frontend.app

      - name: Upload Mac build
        uses: actions/upload-artifact@v4
        with:
          name: WeatherApp-Mac
          path: WeatherApp-Mac.zip

  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/check
